<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký sự kiện</title>
</head>
<body>

    <h1>Form Đăng Ký Tham Gia Sự Kiện</h1>

    <form>

        <label>Họ tên:</label><br>
        <input type="text" name="hoten"><br><br>

        <label>Email:</label><br>
        <input type="email" name="email"><br><br>

        <label>Thời gian tham gia:</label><br>
        <input type="datetime-local" name="thoigian"><br><br>

        <label>Giới tính:</label><br>

        <input type="radio" name="gioitinh" value="Nam"> Nam
        <input type="radio" name="gioitinh" value="Nữ"> Nữ
        <input type="radio" name="gioitinh" value="Khác"> Khác

        <br><br>

        <button type="submit">Xác nhận</button>

    </form>

</body>
</html>
