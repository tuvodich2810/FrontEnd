    <h1>Phở Bò Hà Nội</h1>

    <p>
        Phở bò được làm từ bánh phở, thịt bò, nước dùng ninh từ xương cùng
        nhiều loại gia vị như quế, hồi, gừng và hành nướng.
    </p>

    <p>
        Phở có hương vị thơm ngon, nước dùng đậm đà. Khi ăn thường dùng kèm
        chanh, ớt, rau thơm và quẩy để tăng thêm hương vị.
    </p>
