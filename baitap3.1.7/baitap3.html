<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <form action="">
      <table>
        <tr>
          <td><label for="First name">First Name</label></td>
          <td>
            <input type="text" id="First name" placeholder="First Name" />
          </td>
        </tr>
        <tr>
          <td><label for="Last name">Last Name</label></td>
          <td><input type="text" id="Last name" placeholder="Last Name" /></td>
        </tr>
        <tr>
          <td><label for="email">Email</label></td>
          <td><input type="email" id="email" placeholder="Email" /></td>
        </tr>
        <tr>
          <td><label for="Password">Password</label></td>
          <td>
            <input type="password" id="Password" placeholder="Password" />
          </td>
        </tr>
        <tr>
          <td><label for="">Sex</label></td>
          <td>
            <input type="radio" name="gt" />Male
            <input type="radio" name="gt" />Female
            <input type="radio" name="gt" />Other
            <input type="radio" name="gt" />Khác
          </td>
        </tr>
        <tr>
          <td><label for="age">Age</label></td>
          <td><input type="number" id="age" placeholder="Tuoi" /></td>
        </tr>
        <tr>
          <td><label for="Preference">Preference</label></td>
          <td>
            <input type="checkbox" id="pre1" />
            <label for="pre1">Acrylic</label>
            <input type="checkbox" id="pre2" />
            <label for="pre2">Oil Painting</label>
            <input type="checkbox" id="pre3" />
            <label for="pre3">Watercolor Painting</label>
          </td>
        </tr>
        <tr>
          <td><label for="occupation">Select Occupation</label></td>
          <td>
            <select id="occupation">
              <option value="student">Student</option>
              <option value="teacher">Teacher</option>
              <option value="engineer">Engineer</option>
              <option value="doctor">Doctor</option>
            </select>
          </td>
        </tr>
        <tr>
          <td><label>Bio</label></td>
          <td>
            <textarea
              name="bio"
              id="bio"
              cols="30"
              rows="5"
              placeholder="Write something about yourself..."
            ></textarea>
          </td>
        </tr>
        <tr>
          <td>
            <input type="submit" value="Submit" />
            <input type="reset" value="Reset" />
          </td>
        </tr>
      </table>
    </form>
  </body>
</html>
