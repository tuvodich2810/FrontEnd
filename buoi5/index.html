<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Menu Quán Cà Phê</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
        }

        .menu{
            width: 350px;
            margin: 50px auto;
            background-color: #fff8dc;
            border: 2px solid brown;
            border-radius: 10px;
            padding: 20px;
        }

        h1{
            text-align: center;
            color: brown;
        }

        ul{
            list-style: none;
            padding: 0;
        }

        li{
            margin: 12px 0;
        }

        .ten{
            color: green;
            font-weight: bold;
        }

        .gia{
            color: red;
            float: right;
        }

        button{
            width: 100%;
            padding: 10px;
            background-color: brown;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover{
            background-color: orange;
        }
    </style>
</head>
<body>

<div class="menu">
    <h1>MENU QUÁN CÀ PHÊ</h1>

    <ul>
        <li><span class="ten">Cà phê đen</span> <span class="gia">25.000đ</span></li>
        <li><span class="ten">Cà phê sữa</span> <span class="gia">30.000đ</span></li>
        <li><span class="ten">Bạc xỉu</span> <span class="gia">35.000đ</span></li>
        <li><span class="ten">Trà đào</span> <span class="gia">40.000đ</span></li>
        <li><span class="ten">Matcha</span> <span class="gia">45.000đ</span></li>
    </ul>

    <button>Đặt ngay</button>
</div>

</body>
</html>
