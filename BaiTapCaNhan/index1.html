<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Profile Cá Nhân</title>
    <style>
         body {
                background-color: aqua;
        }
 
        .card {
        width: 350px;
        margin: 50px auto;
        padding: 20px;
        border: 2px solid gray;
        border-radius: 15px;
        background-color: white;
        text-align: center;
        }
        .avatar {
            width: 120px;
            height: 150px;
            border-radius: 50%;
            border: 3px solid #3498db;
            display: block;
            margin: 0 auto;
        }
        .name {
            text-align: center;
            font-size: 30px;
            margin-top: 15px;
        }
        .job {
            text-align: center;
            color: #3498db;
            font-size: 18px;
        }
        .bio {
            text-align: center;
            margin: 20px 0;
        }
        .skills {
            display: inline-block;
            background-color: #dfefff;
            padding: 8px 15px;
            margin: 5px;
            border-radius: 8px;
            list-style: none;
        }
        .btn {
            display: block;
            width: 120px;
            margin: 20px auto;
            padding: 10px;
            background-color: #3498db;
            color: white;
            text-align: center;
            text-decoration: none;
            border-radius: 8px;
        }
        .btn:hover {
            background-color:#21618c;
            transition: ease 0.25s;
        }
    </style>
</head>
<body>
    <div class="card">
        <img class="avatar" src="./1784345174221_403007555926975778_1385501029061975695_ba94f3b5a346ea579605e9cfc377b6ac.jpg" alt="Ảnh đại diện", width="150",height="150">
        <h2 class="name">Lê Thành Nhân</h2>
        <p class="job">Học Lập trình viên Web</p>
        <p class="bio">
        Em tên Quang Tuấn đang học ngành CNTT hiện tại đang học những kỹ năng xây dựng website.
        </p>
        <ul class="skills">
            <li>HTML</li>
            <li>CSS</li>
            <li>JavaScript</li>
        </ul>
        <a href="https://www.fb.com/itvlsc" class="btn">Liên hệ Qua Trang Cá Nhân</a> 
    </div>
</body>
</html>
